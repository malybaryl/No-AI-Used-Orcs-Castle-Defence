name: build-executables
run-name: Building execution files ${{ github.actor }}
on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build executable
        run: pyinstaller --onefile --nowindowed main.py

      - name: Rename executable
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mv dist/main.exe dist/OrcsCastleDefence.exe
          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            mv dist/main dist/OrcsCastleDefence
          fi
        shell: bash
      - name: Copy sources files
        run: |
          cp -r assets/* dist/;
          cp -r src/* dist/;
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrcsCastleDefence-${{ matrix.os }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List downloaded files (Debugging)
        run: ls -R

      - name: Make files executable (Linux)
        run: chmod +x OrcsCastleDefence* || true
      
      - name: pack all files (Linux)
        run: mkdir OrcsCastleDefence-linux;
             cp -r assets/* OrcsCastleDefence-linux/;
             cp -r src/* OrcsCastleDefence-linux/;
 
      - name: zip release folder (Linux)
        run: zip -r OrcsCastleDefence-linux.zip ./OrcsCastleDefence-linux/

      - name: pack all files (Windows)
        run: mkdir OrcsCastleDefence-windows;
             cp -r assets/* OrcsCastleDefence-windows/;
             cp -r src/* OrcsCastleDefence-windows/;
 
      - name: zip release folder (windows)
        run: zip -r OrcsCastleDefence-windows.zip ./OrcsCastleDefence-windows/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: Release ${{ github.event.inputs.version }}
          draft: false
          prerelease: false
          files: |
            OrcsCastleDefence-linux.zip
            OrcsCastleDefence-windows.zip
